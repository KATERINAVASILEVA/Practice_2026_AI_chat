<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Чат</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="chat-box">
        <!-- Окно входа -->
        <div id="login-area">
            <h2>Вход в чат</h2>
            <p style="color:#666; font-size:14px;">Введите ваше имя, чтобы продолжить</p>
            <input type="text" id="username-input" placeholder="Ваше имя..." maxlength="20">
            <button onclick="login()">Войти</button>
            <div class="login-error" id="login-error">Пожалуйста, введите имя</div>
        </div>

        <!-- Чат -->
        <div id="chat-area">
            <div class="header">
                <h2>Чат</h2>
                <div class="user-info">
                    Пользователь: <span class="name" id="current-user">Гость</span>
                    <span id="file-status" style="margin-left:15px; font-weight:normal;">нет файла</span>
                </div>
            </div>

            <div class="messages" id="messages">
                <div class="welcome" id="welcomeMsg">
                    <p>Задайте вопрос или загрузите файл для анализа</p>
                    <p style="font-size:12px; color:#ccc; margin-top:8px;">📎 Можно перетащить файл прямо в окно чата</p>
                </div>
            </div>

            <div class="loading" id="loading">Модель думает...</div>

            <div class="input-area">
                <div class="file-btn" id="fileBtn">
                    📎
                    <input type="file" id="fileInput" accept=".txt,.pdf,.docx,.xlsx,.xls,.csv">
                </div>
                <input type="text" id="msgInput" placeholder="Напишите что-нибудь..." />
                <button id="sendBtn">Отправить</button>
                <button id="stopBtn" class="stop-btn">Стоп</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
